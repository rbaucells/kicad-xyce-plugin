<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="48"
    height="48"
    viewBox="0 0 48 48">

  <!-- Transparent background -->

  <!-- Outer circular frame -->
  <circle
      cx="24"
      cy="20"
      r="16"
      fill="none"
      stroke="#9AA7B5"
      stroke-width="2.5"/>

  <!-- Scope grid -->
  <line x1="8" y1="20" x2="40" y2="20"
        stroke="#6C7A89"
        stroke-width="1.2"/>

  <line x1="24" y1="4" x2="24" y2="36"
        stroke="#6C7A89"
        stroke-width="1.2"/>

  <!-- Waveform -->
  <path
      d="M10 24
         C13 10, 17 10, 20 24
         S27 38, 30 20
         S37 10, 38 22"
      fill="none"
      stroke="#3FA9F5"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>

  <!-- Xyce text -->
  <text
      x="24"
      y="45"
      font-family="Arial, Helvetica, sans-serif"
      font-size="10"
      text-anchor="middle"
      fill="#1E5AA8"
      font-weight="bold">
    Xyce
  </text>

</svg>
