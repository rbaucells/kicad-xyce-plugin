name: CI

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Tools
        run: |
          python -m pip install --upgrade pip
          pip install build coverage flake8
          pip install -r requirements.txt

      - name: Dependencies
        run: |
          pip install --no-deps .
          pip install dataclasses-json>=0.6.7
          pip install kicad-python>=0.7.1
          pip install numpy>=2.4.4

      - name: Lint
        run: |
          flake8 .

      - name: Unit Tests
        run: |
          coverage run -m unittest discover -p '*_test.py'
          coverage report -m
          coverage xml -o coverage.xml || true

      - name: Build
        run: |
          python -m hatch build --target kicad-package
