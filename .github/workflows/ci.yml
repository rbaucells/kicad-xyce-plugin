name: CI

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies
        run: sudo apt-get install -y libegl1

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage flake8 pytest
          pip install -r requirements.txt
          pip install -r src/requirements.txt

      - name: Lint
        run: |
          flake8 .

      - name: Unit Tests
        run: |
          coverage run --source=src -m pytest tests/
          coverage report -m
          coverage xml -o coverage.xml || true

      - name: Build
        run: |
          python -m hatch build --target kicad-package

      - name: Build Wheel
        run: |
          cp -r src xyce_simulator
          printf 'import os, sys; sys.path.insert(0, os.path.dirname(__file__))\n' > xyce_simulator/__init__.py
          python -m hatch build --target wheel
          rm -rf xyce_simulator
